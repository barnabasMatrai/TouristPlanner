<div class="dashboard">
  <nav class="navbar">
    <div class="navbar-brand">Tour <span>Planner</span></div>
    <div class="navbar-user">
      <span>Hello, {{ authService.user()?.username }}</span>
      <button class="btn-logout" (click)="onLogout()">Logout</button>
    </div>
  </nav>

  <div class="main">
    <app-tour-list></app-tour-list>

    <div class="content">

      @if (tourVm.showForm()) {
        <app-tour-create></app-tour-create>

      } 
      @else {

        @if (tourVm.showSearch()) {
          <app-search></app-search>
        } @else {
          
          @if (tourVm.selectedTour(); as tour) {
            <app-tour-info [tourSignal]="tour"></app-tour-info>
          } @else {
            <p>No tour selected</p>
          }
        }
      }

    </div>
  </div>
</div>
