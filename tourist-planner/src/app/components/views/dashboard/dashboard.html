<div class="dashboard">
  <nav class="navbar">
    <div class="navbar-brand">Tour <span>Planner</span></div>
    <div class="navbar-user">
      <span>Hello, Jarod</span>
      <button class="btn-logout" (click)="onLogout()">Logout</button>
    </div>
  </nav>

  <div class="main">
    <app-tour-list></app-tour-list>
    <div class="content">

      <div class="map-placeholder">
        <div class="map-inner">
          <div class="map-icon">🗺️</div>
          <p>Map will appear here</p>
        </div>
      </div>

      <div class="detail-panel">
        <div class="detail-top">
          <div>
            <h3>Alps Hike</h3>
            <p class="detail-location">📍 Innsbruck → Salzburg</p>
          </div>
        </div>

        <app-tour-info></app-tour-info>

        <div class="detail-description">
          <h4>Description</h4>
          <p>A challenging alpine hike through the Tyrolean Alps with stunning views.</p>
        </div>

        <div class="detail-actions">
          <button class="btn-action btn-view">View on Map</button>
          <button class="btn-action btn-edit">Edit</button>
          <button class="btn-action btn-delete">Delete</button>
        </div>
      </div>

    </div>
  </div>
</div>
