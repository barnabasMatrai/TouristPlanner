<div class="dashboard">
  <nav class="navbar">
    <div class="navbar-brand">Tour <span>Planner</span></div>
    <div class="navbar-user">
      <span>Hello, Jarod</span>
      <button class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>My Tours</h2>
        <button class="btn-add">+ Add Tour</button>
      </div>

      <div class="tour-list">
        <div class="tour-item active">
          <div class="tour-item-top">
            <span class="tour-name">Alps Hike</span>
            <span class="badge badge-active">Active</span>
          </div>
          <div class="tour-meta">
            <span>🥾 Hiking</span>
            <span>Jun 02, 2025</span>
          </div>
        </div>

        <div class="tour-item">
          <div class="tour-item-top">
            <span class="tour-name">Croatia Bike</span>
            <span class="badge badge-done">Done</span>
          </div>
          <div class="tour-meta">
            <span>🚴 Biking</span>
            <span>Jan 04, 2025</span>
          </div>
        </div>

        <div class="tour-item">
          <div class="tour-item-top">
            <span class="tour-name">Dolomites Run</span>
            <span class="badge badge-active">Active</span>
          </div>
          <div class="tour-meta">
            <span>🏃 Running</span>
            <span>Jan 09, 2025</span>
          </div>
        </div>

        <div class="tour-item">
          <div class="tour-item-top">
            <span class="tour-name">Scotland Tour</span>
            <span class="badge badge-done">Done</span>
          </div>
          <div class="tour-meta">
            <span>🌍 Vacation</span>
            <span>Jan 10, 2025</span>
          </div>
        </div>

        <div class="tour-item">
          <div class="tour-item-top">
            <span class="tour-name">Dot Trail</span>
            <span class="badge badge-done">Done</span>
          </div>
          <div class="tour-meta">
            <span>🥾 Hiking</span>
            <span>Dec 03, 2024</span>
          </div>
        </div>
      </div>
    </aside>

    <div class="content">
      <div class="map-inner">
        <app-leaflet-map></app-leaflet-map>
      </div>

      <div class="detail-panel">
        <h3>Alps Hike</h3>
        <div class="detail-meta">
          <span>🥾 Hiking</span>
          <span>Jun 02, 2025</span>
          <span class="badge badge-active">Active</span>
        </div>
        <div class="detail-actions">
          <button class="btn-action btn-view">View Details</button>
          <button class="btn-action btn-edit">Edit</button>
          <button class="btn-action btn-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>
