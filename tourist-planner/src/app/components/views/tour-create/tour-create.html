<form #tourForm="ngForm" (ngSubmit)="onSubmit(tourForm)">
  <h2>Create Tour</h2>

  <!-- Name -->
  <label for="name">Tour Name</label>
  <input
    id="name"
    type="text"
    name="name"
    [(ngModel)]="tourCreateVm.name"
    required
  />

  <!-- Description -->
  <label for="description">Description</label>
  <textarea
    id="description"
    name="description"
    rows="3"
    [(ngModel)]="tourCreateVm.description"
    required
  ></textarea>

  <!-- From -->
  <label for="from">From</label>
  <input
    id="from"
    type="text"
    name="from"
    [(ngModel)]="tourCreateVm.from"
    required
  />

  <!-- To -->
  <label for="to">To</label>
  <input
    id="to"
    type="text"
    name="to"
    [(ngModel)]="tourCreateVm.to"
    required
  />

  <!-- Transport Type -->
  <label for="transport">Transport Type</label>
  <select
    id="transport"
    name="transportType"
    [(ngModel)]="tourCreateVm.transportType"
    required
  >
    <option value="">Select transport type</option>
    <option value="bus">Bus</option>
    <option value="train">Train</option>
    <option value="plane">Plane</option>
    <option value="boat">Boat</option>
    <option value="car">Car</option>
  </select>

  <!-- Route Info -->
  <label for="routeInfo">Route Information</label>
  <textarea
    id="routeInfo"
    name="routeInformation"
    rows="2"
    [(ngModel)]="tourCreateVm.routeInformation"
  ></textarea>

  <!-- Distance -->
  <label for="distance">Distance (km)</label>
  <input
    id="distance"
    type="number"
    name="distanceKm"
    [(ngModel)]="tourCreateVm.distanceKm"
  />

  <!-- Estimated Time -->
  <label for="time">Estimated Time (minutes)</label>
  <input
    id="time"
    type="number"
    name="estimatedTimeMinutes"
    [(ngModel)]="tourCreateVm.estimatedTimeMinutes"
  />

  <!-- Submit Button -->
  <button type="submit" [disabled]="tourForm.invalid">Create Tour</button>
</form>
