<body>

  <form action="#" method="POST">
    <h2>Create a Tour</h2>

    <label for="name">Tour Name</label>
    <input type="text" id="name" name="name" placeholder="Enter tour name" required>

    <label for="description">Tour Description</label>
    <textarea id="description" name="description" rows="4" placeholder="Enter tour description" required></textarea>

    <label for="from">From</label>
    <input type="text" id="from" name="from" placeholder="Starting location" required>

    <label for="to">To</label>
    <input type="text" id="to" name="to" placeholder="Destination" required>

    <label for="transport">Transport Type</label>
    <select id="transport" name="transport" required>
      <option value="">Select transport type</option>
      <option value="bus">Bus</option>
      <option value="train">Train</option>
      <option value="plane">Plane</option>
      <option value="boat">Boat</option>
      <option value="car">Car</option>
    </select>

    <button type="submit">Submit Tour</button>
  </form>

</body>
