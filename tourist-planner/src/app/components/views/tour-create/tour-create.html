<div class="form-card">
  <form #tourForm="ngForm" (ngSubmit)="onSubmit(tourForm)">
    <h2>{{ this.tourCreateVm.isEditing() ? 'Update Tour' : 'Create Tour' }}</h2>

    <div class="form-grid">
      <!-- Name -->
      <div class="form-group">
        <label for="name">Tour Name</label>
        <input id="name" type="text" name="name"
          [(ngModel)]="tourCreateVm.name" required />
      </div>

      <!-- Description -->
      <div class="form-group full">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3"
          [(ngModel)]="tourCreateVm.description" required></textarea>
      </div>

      <!-- From -->
      <div class="form-group">
        <label for="from">From</label>
        <input id="from" type="text" name="from"
          [(ngModel)]="tourCreateVm.from" required />
      </div>

      <!-- To -->
      <div class="form-group">
        <label for="to">To</label>
        <input id="to" type="text" name="to"
          [(ngModel)]="tourCreateVm.to" required />
      </div>

      <!-- Transport -->
      <div class="form-group">
        <label for="transport">Transport Type</label>
        <select id="transport" name="transportType"
          [(ngModel)]="tourCreateVm.transportType" required>
          <option value="">Select transport</option>
          <option value="bus">Bus</option>
          <option value="train">Train</option>
          <option value="plane">Plane</option>
          <option value="boat">Boat</option>
          <option value="car">Car</option>
        </select>
      </div>

      <!-- Route Info -->
      <div class="form-group full">
        <label for="routeInfo">Route Info</label>
        <textarea id="routeInfo" name="routeInformation" rows="2"
          [(ngModel)]="tourCreateVm.routeInformation"></textarea>
      </div>
    </div>

    <button class="btn-submit" type="submit" [disabled]="tourForm.invalid">
      {{ this.tourCreateVm.isEditing() ? 'Update Tour' : 'Create Tour' }}
    </button>
  </form>
</div>
