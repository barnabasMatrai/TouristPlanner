<div class="tour-log-card">
  <div class="tour-log-header">
    <h4>Tour Logs</h4>
    <button class="btn-action btn-view" type="button" (click)="toggleForm()">
      {{ vm.showForm() ? 'Close' : 'Add Log' }}
    </button>
  </div>

  @if (vm.showForm()) {
    <app-tour-log-create [tourId]="tourId()" />
  }

  <app-tour-log-list [tourId]="tourId()" />
</div>
